<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Page Not Found | Apex Eco Solutions</title>
<meta name="robots" content="noindex, follow">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  :root{ --black:#0b0c0d; --white:#f2f4f6; --smoke:#8a949e; --lime:#c8e600; --lime-dk:#a8c000;
         --display:'Bebas Neue',Impact,sans-serif; --body:'DM Sans',system-ui,sans-serif; }
  *{margin:0;padding:0;box-sizing:border-box}
  body{ background:var(--black); color:var(--white); font-family:var(--body); min-height:100vh;
        display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; padding:40px 24px;
        background-image:radial-gradient(circle at 50% 0%, rgba(200,230,0,.06), transparent 55%); }
  img.logo{ height:64px; width:auto; margin-bottom:40px; }
  .code{ font-family:var(--display); font-size:clamp(6rem,22vw,12rem); line-height:.9; color:var(--lime); letter-spacing:.02em; }
  h1{ font-family:var(--display); font-size:clamp(1.6rem,5vw,2.6rem); letter-spacing:.03em; margin:8px 0 14px; }
  p{ color:var(--smoke); font-weight:300; max-width:46ch; line-height:1.7; margin-bottom:32px; }
  a.btn{ display:inline-flex; align-items:center; gap:10px; background:var(--lime); color:var(--black);
         font-weight:700; letter-spacing:.16em; text-transform:uppercase; font-size:.78rem;
         padding:15px 34px; border-radius:2px; text-decoration:none; transition:background .2s,transform .2s; }
  a.btn:hover{ background:var(--lime-dk); transform:translateY(-2px); }
  .phone{ margin-top:26px; font-size:.85rem; color:var(--smoke); }
  .phone a{ color:var(--lime); text-decoration:none; }
</style>
</head>
<body>
  <a href="/"><img class="logo" src="/assets/logo.png" alt="Apex Eco Solutions"></a>
  <div class="code">404</div>
  <h1>Page Not Found</h1>
  <p>The page you're looking for has moved or no longer exists. Let's get you back to safe ground.</p>
  <a class="btn" href="/">Back to Home <span>&rarr;</span></a>
  <div class="phone">Need help now? Call <a href="tel:7782201291">778-220-1291</a></div>
</body>
</html>
